import lit.formats
import os
import shutil
from pathlib import Path

config.test_source_root = os.path.dirname(__file__)
config.name = "VeIR"
config.suffixes = ['.mlir']

veir_root = Path(config.test_source_root).parent
config.test_format = lit.formats.ShTest(preamble_commands=[f"cd {veir_root}"])
config.substitutions.append(('veir-opt', "lake exec veir-opt"))
config.substitutions.append(('veir-interpret', "lake exec veir-interpret"))
config.substitutions.append(('%scripts', str(veir_root / "scripts")))

# Feature: llzk-opt is available on $PATH or via $LLZK_OPT. Differential tests
# under Test/LLZK/<dialect>/differential/ guard themselves with
# `// REQUIRES: llzk-opt`; without this feature they're skipped instead of
# failing. See harness/differential.md §3.
_llzk_opt = os.environ.get("LLZK_OPT") or shutil.which("llzk-opt")
if _llzk_opt:
    config.available_features.add("llzk-opt")
    # lit sanitizes the environment; propagate LLZK_OPT so the differential
    # script (scripts/llzk-diff.sh) sees it.
    config.environment["LLZK_OPT"] = _llzk_opt
